apiVersion: apps/v1
kind: Deployment
metadata:
  name: sidecar-injector
  namespace: sidecar-injector
  labels:
    app: sidecar-injector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sidecar-injector
  template:
    metadata:
      labels:
        app: sidecar-injector
    spec:
      serviceAccountName: sidecar-injector-sa
      containers:
        - name: sidecar-injector
          image: sidecar-injector:latest # Replace with your actual image
          imagePullPolicy: Always
          ports:
            - containerPort: 8443
          env:
            - name: WEBHOOK_PORT
              value: "8443"
            - name: SIDECAR_IMAGE
              value: "falcosecurity/falco-no-driver:latest"
            - name: SIDECAR_NAME
              value: "security-agent"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: webhook-certs
              mountPath: /etc/webhook/certs
              readOnly: true
      volumes:
        - name: webhook-certs
          secret:
            secretName: sidecar-injector-certs
